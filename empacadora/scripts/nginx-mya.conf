# ─── POS — Punto de Venta ─────────────────────────────────────
server {
    server_name pos.visionzn.net;

    root /home/pos-frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    charset utf-8;
    location ~* \.(js|css)$ {
        add_header Content-Type "text/javascript; charset=UTF-8";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pos.visionzn.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pos.visionzn.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = pos.visionzn.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name pos.visionzn.net;
    return 404; # managed by Certbot
}
