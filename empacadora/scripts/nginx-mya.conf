# APP - Frontend React (empacadora)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name empacadora.visionzn.net;

    ssl_certificate /etc/letsencrypt/live/empacadora.visionzn.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/empacadora.visionzn.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/mya-empacadora;
    index index.html;

    location /api {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Archivos estaticos con hash en nombre: cache largo
    location ~* ^/static/ {
        expires 1y;
        access_log off;
    }

    # index.html: NUNCA cachear para que el browser siempre pida la version nueva
    location = /index.html {
        expires -1;
        add_header Cache-Control no-store;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name empacadora.visionzn.net;
    return 301 https://$host$request_uri;
}

